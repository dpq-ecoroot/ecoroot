<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoRoot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:#111827;
    background:#000;
    line-height:1.6;
}

/* HERO */
.hero{
    background:linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
    url('Fundo-desktop.jpg');
    background-size:cover;
    background-position:center;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    padding:20px;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.9);
    padding:34px 20px;
    z-index:1000;
    backdrop-filter: blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;
}

/* LOGO */
.nav-left{
    position:absolute;
    left:20px;
}

.nav-left img{
    width:115px;
    height:auto;
    object-fit:contain;
    background:white;
    padding:6px;
    border-radius:6px;
}

/* MENU DESKTOP */
.nav-center{
    display:flex;
    gap:22px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:16px;
    font-weight:500;
}

/* BOTÃO */
.menu-toggle{
    display:none;
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    font-size:30px;
    color:white;
    cursor:pointer;
}

/* CONTAINER */
.container{
    background:#f9fafb;
    padding:60px 20px;
}

.card{
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HERO TEXT */
.hero h1{
    font-size:72px;
    margin:0;
}

.hero p{
    font-size:22px;
    opacity:0.95;
}

/* =========================
   MOBILE (SÓ AJUSTES REAIS)
========================= */
@media(max-width:768px){

    /* 🔲 BARRA MAIS ALTA */
    nav{
        padding:40px 12px;
        justify-content:flex-start;
    }

    .menu-toggle{
        display:block;
    }

    .nav-left img{
        width:75px;
        padding:4px;
    }

    /* MENU NORMAL (SEM GRELHAS OU ORGANIZAÇÃO EXTRA) */
    .nav-center{
        display:none;
        position:absolute;
        top:100%;
        left:0;
        width:100%;
        background:rgba(0,0,0,0.95);
        padding:12px 0;
        flex-direction:column;
        text-align:center;
        gap:10px;
    }

    .nav-center.active{
        display:flex;
    }

    nav a{
        font-size:14px;
        padding:8px 0;
    }

    .hero h1{
        font-size:42px;
    }

    .hero p{
        font-size:16px;
    }

    .card{
        padding:22px;
        margin:15px 10px;
    }
}

</style>
</head>

<body>

<nav>

    <div class="nav-left">
        <img src="logo.png">
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-center" id="menu">
        <a href="#produto" onclick="closeMenu()">Produto</a>
        <a href="#vantagens" onclick="closeMenu()">Vantagens</a>
        <a href="#funcionamento" onclick="closeMenu()">Funcionamento</a>
        <a href="#composicao" onclick="closeMenu()">Composição</a>
        <a href="#rotulo" onclick="closeMenu()">Rótulo</a>
    </div>

</nav>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>EcoRoot</h1>
        <p>Cuvetes biodegradáveis com libertação controlada de nutrientes</p>
    </div>
</section>

<section class="container">

<div class="card">
<h2>O Produto</h2>
<p>Texto do produto...</p>
</div>

</section>

<script>

let open = false;

function toggleMenu(){
    const menu = document.getElementById("menu");
    open = !open;

    if(open){
        menu.classList.add("active");
    } else {
        menu.classList.remove("active");
    }
}

function closeMenu(){
    document.getElementById("menu").classList.remove("active");
    open = false;
}

</script>

</body>
</html>
